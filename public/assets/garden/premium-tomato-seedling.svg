<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">

<defs>
  <filter id="softShadow" x="-30%" y="-30%" width="160%" height="180%">
    <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#5b7d49" flood-opacity=".18"/>
  </filter>
  <filter id="goldGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#b9f66d"/>
    <stop offset="1" stop-color="#6dc94a"/>
  </linearGradient>
  <linearGradient id="soil" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#9a6339"/>
    <stop offset="1" stop-color="#6a3e27"/>
  </linearGradient>
  <radialGradient id="plotGlow" cx="50%" cy="42%" r="55%">
    <stop offset="0" stop-color="#fff9ba"/>
    <stop offset=".55" stop-color="#ffd35a"/>
    <stop offset="1" stop-color="#f6a61d"/>
  </radialGradient>
</defs>

<g filter="url(#softShadow)">
  <path d="M128 204c0-62 4-104 13-152" stroke="#4fa545" stroke-width="12" stroke-linecap="round"/>
  <path d="M134 82c-27-9-45-26-55-52 31 3 50 17 61 43z" fill="#70c957"/>
  <path d="M137 112c27-14 51-10 72 8-30 10-54 7-72-3z" fill="#84d56f"/>
  <path d="M119 137c-29 5-52-3-69-23 33-5 58 1 73 16z" fill="#6fbe59"/>
  
</g>

</svg>
